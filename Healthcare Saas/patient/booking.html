<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Book an Appointment | CuraHealth</title>
  <meta name="description" content="Premium mobile-first appointment booking experience for patients.">
  <link rel="stylesheet" href="../../css/globals.css">
  <link rel="stylesheet" href="../../css/typography.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/animations.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="patient-app.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="patient-page-body">
  <div class="patient-shell">
    <header class="patient-header">
      <a href="../../index.html" class="patient-brand">
        <span class="patient-brand-mark">CH</span>
        <span>CuraHealth</span>
      </a>
      <div class="patient-pill">Secure booking link</div>
    </header>

    <main class="patient-main">
      <section class="patient-hero">
        <div class="patient-hero-copy">
          <div class="eyebrow">Hospital reception</div>
          <h1>Booking made effortless.</h1>
          <p>Open with your mobile number, confirm your details, and secure a premium care visit in minutes.</p>
        </div>
        <div class="patient-hero-card">
          <div class="patient-hero-card-top">
            <span class="patient-kicker">Fast care access</span>
            <span class="patient-stat">24/7 concierge</span>
          </div>
          <div class="patient-hero-card-body">
            <div><strong>4.9/5</strong><span>Patient satisfaction</span></div>
            <div><strong>12 min</strong><span>Average response</span></div>
            <div><strong>100%</strong><span>Mobile-first flow</span></div>
          </div>
        </div>
      </section>

      <section id="patient-page-root" class="patient-card"></section>
    </main>
  </div>

  <script src="patient-app.js"></script>
</body>
</html>
